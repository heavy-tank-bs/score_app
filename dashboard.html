<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - 草野球スコアアプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <a href="index.html" class="navbar-brand"><i class="bi bi-arrow-left me-1"></i>草野球スコアアプリ</a>
  <a href="dashboard.html" class="nav-link text-white active small">ダッシュボード</a>
</nav>

<div class="container py-3">

  <!-- Filter -->
  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <label class="fw-semibold small mb-0">期間：</label>
        <select id="filterYear" class="form-select form-select-sm" style="width:auto" onchange="applyFilter()">
          <option value="all">全期間</option>
        </select>
        <span class="text-muted small" id="filterGameCount"></span>
      </div>
    </div>
  </div>

  <!-- Main Tabs -->
  <ul class="nav nav-tabs mb-3" id="mainTabs">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('batting');return false"><i class="bi bi-bar-chart me-1"></i>打撃</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('pitching');return false"><i class="bi bi-person-badge me-1"></i>投手</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('ranking');return false"><i class="bi bi-trophy me-1"></i>ランキング</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('spray');return false"><i class="bi bi-geo me-1"></i>打球方向</a></li>
  </ul>

  <!-- TAB: 打撃成績 -->
  <div id="tabBatting">
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover stats-table mb-0" id="battingTable">
            <thead>
              <tr>
                <th>選手</th><th>試</th><th>打席</th><th>打数</th><th>安打</th>
                <th>二塁</th><th>三塁</th><th>本塁</th><th>打点</th>
                <th>四球</th><th>三振</th><th>打率</th><th>出塁率</th>
                <th>長打率</th><th>OPS</th><th>IsoP</th><th>IsoD</th>
              </tr>
            </thead>
            <tbody id="battingBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: 投手成績 -->
  <div id="tabPitching" style="display:none">
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover stats-table mb-0" id="pitchingTable">
            <thead>
              <tr>
                <th>選手</th><th>登板</th><th>勝</th><th>負</th><th>S</th>
                <th>投球回</th><th>被安打</th><th>奪三振</th><th>四球</th>
                <th>死球</th><th>失点</th><th>自責点</th><th>ERA</th>
              </tr>
            </thead>
            <tbody id="pitchingBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: チーム内ランキング -->
  <div id="tabRanking" style="display:none">
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <label class="fw-semibold small mb-0">指標：</label>
          <select id="rankMetric" class="form-select form-select-sm" style="width:auto" onchange="renderRankingChart()">
            <option value="avg">打率</option>
            <option value="ops">OPS</option>
            <option value="obp">出塁率</option>
            <option value="slg">長打率</option>
            <option value="hr">本塁打</option>
            <option value="rbi">打点</option>
            <option value="h">安打数</option>
            <option value="bb">四球</option>
            <option value="k">三振</option>
            <option value="isoP">IsoP</option>
            <option value="isoD">IsoD</option>
          </select>
        </div>
        <div class="chart-container mt-3">
          <canvas id="rankChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB: 打球方向（スプレーチャート） -->
  <div id="tabSpray" style="display:none">
    <div class="card mb-3">
      <div class="card-body">
        <div class="d-flex gap-2 flex-wrap mb-3">
          <select id="sprayPlayer" class="form-select form-select-sm" style="width:auto" onchange="renderSprayChart()">
            <option value="all">全選手</option>
          </select>
          <div class="d-flex gap-1 flex-wrap">
            <span class="badge" style="background:#198754">安打多</span>
            <span class="badge" style="background:#fd7e14">長打多</span>
            <span class="badge" style="background:#dc3545">本塁打</span>
            <span class="badge" style="background:#6c757d">アウト多</span>
            <span class="text-muted small align-self-center">※数字=件数</span>
          </div>
        </div>
        <!--
          フィールド設計:
          - ホームベース (150,245)
          - ファウルライン: 左右ともに 45° = L(5,100) R(295,100)
          - 1B (214,181), 3B (86,181) はファウルライン上
          - 2B (150,117) = 1B+3B-Home
        -->
        <svg id="sprayChart" viewBox="0 0 300 255" class="spray-full-svg">
          <!-- フェアテリトリー (45°ファン) -->
          <path d="M 150,245 L 5,100 Q 150,-15 295,100 Z" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
          <!-- 内野ダイヤモンド (1B・3Bはファウルライン上) -->
          <path d="M 150,245 L 214,181 L 150,117 L 86,181 Z" fill="#f5e6c8" stroke="#bbb" stroke-width="1"/>
          <!-- ピッチャーズマウンド -->
          <circle cx="150" cy="170" r="8" fill="#d4a853" opacity="0.7"/>
          <!-- ベース (ファウルラインに合わせた位置) -->
          <rect x="143" y="238" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 150 245)"/>
          <rect x="207" y="174" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 214 181)"/>
          <rect x="143" y="110" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 150 117)"/>
          <rect x="79"  y="174" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 86 181)"/>
          <!-- ゾーンラベル (薄く表示) -->
          <text x="50"  y="127" text-anchor="middle" font-size="10" fill="#2d6a4f" opacity="0.55">LF</text>
          <text x="90"  y="96"  text-anchor="middle" font-size="10" fill="#2d6a4f" opacity="0.55">左中</text>
          <text x="150" y="78"  text-anchor="middle" font-size="10" fill="#2d6a4f" opacity="0.55">CF</text>
          <text x="210" y="96"  text-anchor="middle" font-size="10" fill="#2d6a4f" opacity="0.55">右中</text>
          <text x="250" y="127" text-anchor="middle" font-size="10" fill="#2d6a4f" opacity="0.55">RF</text>
          <text x="95"  y="196" text-anchor="middle" font-size="9"  fill="#666"    opacity="0.55">3B</text>
          <text x="118" y="160" text-anchor="middle" font-size="9"  fill="#666"    opacity="0.55">SS</text>
          <text x="150" y="174" text-anchor="middle" font-size="9"  fill="#666"    opacity="0.55">P</text>
          <text x="182" y="160" text-anchor="middle" font-size="9"  fill="#666"    opacity="0.55">2B</text>
          <text x="205" y="196" text-anchor="middle" font-size="9"  fill="#666"    opacity="0.55">1B</text>
          <!-- 数字バッジ(JS描画) -->
          <g id="sprayDots"></g>
        </svg>
        <div class="text-center text-muted small mt-1" id="sprayInfo">打球 0件</div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
