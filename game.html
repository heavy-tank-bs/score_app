<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>試合記録 - 草野球スコアアプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <a href="index.html" class="navbar-brand"><i class="bi bi-arrow-left me-1"></i>草野球スコアアプリ</a>
  <a href="dashboard.html" class="nav-link text-white small">ダッシュボード</a>
</nav>

<div class="container py-3">
  <!-- Step Bar -->
  <div class="step-bar" id="stepBar"></div>

  <!-- ===== STEP 1: スタメン登録 ===== -->
  <div id="stepLineup">
    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-people-fill me-1"></i>自チームスタメン</div>
      <div class="card-body">
        <div id="myLineupSlots"></div>
        <button class="btn btn-sm btn-outline-primary mt-1" onclick="addLineupSlot('my')">
          <i class="bi bi-plus"></i> 選手を追加
        </button>
      </div>
    </div>
    <div class="card mb-3">
      <div class="card-header"><i class="bi bi-people me-1"></i>相手チームスタメン</div>
      <div class="card-body">
        <div id="oppLineupSlots"></div>
        <button class="btn btn-sm btn-outline-primary mt-1" onclick="addLineupSlot('opp')">
          <i class="bi bi-plus"></i> 選手を追加
        </button>
      </div>
    </div>
    <button class="btn btn-primary w-100" onclick="saveLineupAndGo()">
      <i class="bi bi-arrow-right-circle me-1"></i>スタメン確定・試合記録へ
    </button>
  </div>

  <!-- ===== STEP 2: 試合記録 ===== -->
  <div id="stepRecord" style="display:none">

    <!-- Score Hero -->
    <div class="card mb-2">
      <div class="card-body py-3 px-3">
        <!-- チーム名 + スコア -->
        <div class="d-flex align-items-center justify-content-between">
          <div class="text-start" style="flex:1;min-width:0">
            <div class="text-muted" style="font-size:0.68rem">自チーム</div>
            <div class="fw-bold text-truncate" style="font-size:0.95rem" id="recTeamName"></div>
          </div>
          <div class="text-center px-3">
            <div class="d-flex align-items-center justify-content-center gap-2">
              <span class="fw-bold" id="recMyScore" style="font-size:2.4rem;line-height:1;min-width:1.4ch;text-align:center;color:var(--primary)">0</span>
              <span class="text-muted" style="font-size:1.1rem">—</span>
              <span class="fw-bold" id="recOppScore" style="font-size:2.4rem;line-height:1;min-width:1.4ch;text-align:center">0</span>
            </div>
            <div class="mt-1">
              <span id="recInningBadge" style="display:inline-block;background:#f4a261;color:#212529;font-size:0.72rem;font-weight:700;padding:2px 10px;border-radius:20px">1回・試合中</span>
            </div>
          </div>
          <div class="text-end" style="flex:1;min-width:0">
            <div class="text-muted" style="font-size:0.68rem">相手チーム</div>
            <div class="fw-bold text-truncate" style="font-size:0.95rem" id="recOpponent"></div>
          </div>
        </div>
        <!-- 操作行 -->
        <div class="d-flex align-items-center justify-content-between mt-2 pt-2 border-top flex-wrap gap-2">
          <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="text-muted" style="font-size:0.75rem" id="recDate"></span>
            <button class="btn btn-xs btn-outline-secondary" onclick="editLineup()">
              <i class="bi bi-pencil me-1"></i>スタメン編集
            </button>
            <button class="btn btn-xs" id="homeAwayBtn" onclick="toggleHomeAway()">後攻（ホーム）</button>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span id="timerDisplay"
              class="fw-bold font-monospace"
              style="font-size:1rem;min-width:76px;text-align:right;letter-spacing:0.04em">
              00:00:00
            </span>
            <button class="btn btn-sm btn-outline-success" id="timerBtn" onclick="toggleTimer()" title="スタート/ストップ">
              <i class="bi bi-play-fill"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="resetTimer()" title="リセット">
              <i class="bi bi-arrow-counterclockwise"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Score Board -->
    <div class="card mb-2">
      <div class="card-header py-2 d-flex align-items-center justify-content-between">
        <span><i class="bi bi-grid me-1"></i>スコアボード</span>
        <div class="d-flex align-items-center gap-2">
          <button class="inn-btn" style="border-color:rgba(255,255,255,0.8);color:#fff" onclick="changeInnings(-1)">－</button>
          <span id="scoreInnDisplay" class="fw-bold text-white small" style="min-width:28px;text-align:center">7回</span>
          <button class="inn-btn" style="border-color:rgba(255,255,255,0.8);color:#fff" onclick="changeInnings(1)">＋</button>
        </div>
      </div>
      <div class="card-body p-2">
        <div class="table-responsive">
          <table class="scoreboard" id="scoreboard">
            <thead><tr id="inningHeader"><th class="team-name">チーム</th></tr></thead>
            <tbody>
              <tr id="myScoreRow"><td class="team-name">自チーム</td></tr>
              <tr id="oppScoreRow"><td class="team-name">相手</td></tr>
            </tbody>
          </table>
        </div>
        <button class="btn btn-sm btn-primary mt-2" onclick="saveScore()">
          <i class="bi bi-save me-1"></i>スコア保存
        </button>
      </div>
    </div>

    <!-- Scorecard Grid (My Team) -->
    <div class="card mb-2">
      <div class="card-header d-flex align-items-center justify-content-between py-2">
        <span><i class="bi bi-table me-1"></i>打席記録（自チーム）</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light fw-semibold" onclick="openSubModal(null,'my')">選手交代</button>
          <button class="btn btn-sm btn-outline-light fw-semibold" onclick="openPosSwapModal('my')">守備入替</button>
          <span id="inningCountDisplay" style="display:none"></span>
        </div>
      </div>
      <div class="card-body p-0" style="overflow-x:auto">
        <table id="scorecardTable" class="scorecard-table"></table>
      </div>
    </div>

    <!-- Scorecard Grid (Opponent Team) -->
    <div class="card mb-2">
      <div class="card-header d-flex align-items-center justify-content-between py-2" style="background:#495057">
        <span><i class="bi bi-table me-1"></i>打席記録（相手：<span id="recOpponentSc"></span>）</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light fw-semibold" onclick="openSubModal(null,'opp')">選手交代</button>
          <button class="btn btn-sm btn-outline-light fw-semibold" onclick="openPosSwapModal('opp')">守備入替</button>
        </div>
      </div>
      <div class="card-body p-0" style="overflow-x:auto">
        <table id="oppScorecardTable" class="scorecard-table"></table>
      </div>
    </div>

    <!-- Pitcher Assignment (My Team) -->
    <div class="card mb-2">
      <div class="card-header py-2"><i class="bi bi-person-badge me-1"></i>投手記録（自チーム）</div>
      <div class="card-body p-2" id="pitcherAssignmentArea">
        <p class="text-muted small mb-0">スコアボードを保存してからイニングごとに投手を選択してください</p>
      </div>
    </div>

    <!-- Pitcher Assignment (Opponent) -->
    <div class="card mb-2">
      <div class="card-header py-2" style="background:#495057;color:#fff"><i class="bi bi-person-badge me-1"></i>投手記録（相手チーム）</div>
      <div class="card-body p-2" id="oppPitcherAssignmentArea">
        <p class="text-muted small mb-0">「先発投手を追加」ボタンで相手投手を登録してください</p>
      </div>
    </div>

    <!-- Complete Game -->
    <button class="btn btn-success w-100 mb-3" onclick="completeGame()">
      <i class="bi bi-flag-fill me-1"></i>試合終了・確定
    </button>
  </div>
</div>

<!-- ===== At-bat Modal ===== -->
<div class="modal fade" id="abModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:var(--primary);color:#fff">
        <h6 class="modal-title mb-0" id="abModalTitle">打席を記録</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Batter selection -->
        <div class="mb-3">
          <label class="form-label fw-semibold">打者</label>
          <select id="abBatter" class="form-select">
            <option value="">選手を選択...</option>
          </select>
        </div>

        <!-- Pitch sequence (above result) -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label fw-semibold mb-0">球数記録 <small class="text-muted fw-normal">（任意）</small></label>
            <button type="button" class="btn btn-xs btn-outline-secondary" onclick="removeLastPitch()">
              <i class="bi bi-backspace"></i> 取消
            </button>
          </div>
          <div class="result-grid mb-2">
            <div class="result-btn pitch-strike" onclick="addPitch('K')">見逃し</div>
            <div class="result-btn pitch-strike" onclick="addPitch('S')">空振り</div>
            <div class="result-btn pitch-strike" onclick="addPitch('F')">ファール</div>
            <div class="result-btn pitch-ball"   onclick="addPitch('B')">ボール</div>
          </div>
          <div id="pitchSequence" class="d-flex flex-wrap gap-1 mb-1" style="min-height:18px"></div>
          <div id="pitchCountLabel" class="text-muted small"></div>
        </div>

        <!-- Result -->
        <div class="mb-3">
          <label class="form-label fw-semibold">打席結果</label>
          <div class="result-grid" id="resultGrid"></div>
        </div>

        <!-- Direction (shown when needed) -->
        <div id="directionSection" class="mb-3" style="display:none">
          <label class="form-label fw-semibold">打球方向</label>
          <svg id="dirSvg" viewBox="-40 -10 380 295" class="spray-svg" style="max-width:300px;">
            <!-- ファウルテリトリー (薄ピンク) -->
            <path d="M 150,242 L -30,80 Q 150,-30 330,80 Z" fill="rgba(255,200,200,0.18)" stroke="#e57373" stroke-width="1" stroke-dasharray="4,3"/>
            <!-- フェアテリトリー (45°ファン) -->
            <path d="M 150,242 L 5,97 Q 150,-13 295,97 Z" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
            <!-- 内野ダイヤモンド -->
            <path d="M 150,242 L 214,178 L 150,114 L 86,178 Z" fill="#f5e6c8" stroke="#bbb" stroke-width="1"/>
            <!-- ピッチャーズマウンド -->
            <circle cx="150" cy="167" r="8" fill="#d4a853" opacity="0.8"/>
            <!-- ベース -->
            <rect x="143" y="235" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 150 242)"/>
            <rect x="207" y="171" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 214 178)"/>
            <rect x="143" y="107" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 150 114)"/>
            <rect x="79"  y="171" width="14" height="14" fill="white" stroke="#555" stroke-width="1.5" transform="rotate(45 86 178)"/>
            <!-- クリック可能ゾーン (外野) -->
            <circle cx="50"  cy="124" r="28" class="spray-zone" data-dir="LF" fill="rgba(200,230,200,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="90"  cy="93"  r="28" class="spray-zone" data-dir="LC" fill="rgba(200,230,200,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="150" cy="75"  r="28" class="spray-zone" data-dir="CF" fill="rgba(200,230,200,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="210" cy="93"  r="28" class="spray-zone" data-dir="RC" fill="rgba(200,230,200,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="250" cy="124" r="28" class="spray-zone" data-dir="RF" fill="rgba(200,230,200,0.15)" stroke="transparent" stroke-width="2"/>
            <!-- クリック可能ゾーン (内野) -->
            <circle cx="95"  cy="192" r="22" class="spray-zone" data-dir="3B" fill="rgba(200,200,240,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="118" cy="158" r="22" class="spray-zone" data-dir="SS" fill="rgba(200,200,240,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="150" cy="168" r="22" class="spray-zone" data-dir="P"  fill="rgba(200,200,240,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="182" cy="158" r="22" class="spray-zone" data-dir="2B" fill="rgba(200,200,240,0.15)" stroke="transparent" stroke-width="2"/>
            <circle cx="205" cy="192" r="22" class="spray-zone" data-dir="1B" fill="rgba(200,200,240,0.15)" stroke="transparent" stroke-width="2"/>
            <!-- クリック可能ゾーン (キャッチャー・ファウル) -->
            <circle cx="150" cy="262" r="18" class="spray-zone" data-dir="C"     fill="rgba(255,200,200,0.25)" stroke="transparent" stroke-width="2"/>
            <circle cx="38"  cy="218" r="20" class="spray-zone" data-dir="3Foul" fill="rgba(255,200,200,0.25)" stroke="transparent" stroke-width="2"/>
            <circle cx="262" cy="218" r="20" class="spray-zone" data-dir="1Foul" fill="rgba(255,200,200,0.25)" stroke="transparent" stroke-width="2"/>
            <circle cx="-18" cy="104" r="22" class="spray-zone" data-dir="LFoul" fill="rgba(255,200,200,0.25)" stroke="transparent" stroke-width="2"/>
            <circle cx="318" cy="104" r="22" class="spray-zone" data-dir="RFoul" fill="rgba(255,200,200,0.25)" stroke="transparent" stroke-width="2"/>
            <!-- ゾーンラベル (フェア) -->
            <text x="50"  y="128" text-anchor="middle" font-size="12" fill="#2d6a4f" pointer-events="none">LF</text>
            <text x="90"  y="97"  text-anchor="middle" font-size="11" fill="#2d6a4f" pointer-events="none">左中</text>
            <text x="150" y="79"  text-anchor="middle" font-size="12" fill="#2d6a4f" pointer-events="none">CF</text>
            <text x="210" y="97"  text-anchor="middle" font-size="11" fill="#2d6a4f" pointer-events="none">右中</text>
            <text x="250" y="128" text-anchor="middle" font-size="12" fill="#2d6a4f" pointer-events="none">RF</text>
            <text x="95"  y="196" text-anchor="middle" font-size="11" fill="#555" pointer-events="none">3B</text>
            <text x="118" y="162" text-anchor="middle" font-size="11" fill="#555" pointer-events="none">SS</text>
            <text x="150" y="172" text-anchor="middle" font-size="11" fill="#555" pointer-events="none">P</text>
            <text x="182" y="162" text-anchor="middle" font-size="11" fill="#555" pointer-events="none">2B</text>
            <text x="205" y="196" text-anchor="middle" font-size="11" fill="#555" pointer-events="none">1B</text>
            <!-- ゾーンラベル (キャッチャー・ファウル) -->
            <text x="150" y="266" text-anchor="middle" font-size="11" fill="#c62828" pointer-events="none">C</text>
            <text x="38"  y="222" text-anchor="middle" font-size="10" fill="#c62828" pointer-events="none">3F</text>
            <text x="262" y="222" text-anchor="middle" font-size="10" fill="#c62828" pointer-events="none">1F</text>
            <text x="-18" y="108" text-anchor="middle" font-size="10" fill="#c62828" pointer-events="none">L-F</text>
            <text x="318" y="108" text-anchor="middle" font-size="10" fill="#c62828" pointer-events="none">R-F</text>
          </svg>
          <div class="text-center text-muted small mt-1">フィールドをタップして方向を選択</div>
          <div class="text-center mt-1">
            <span id="dirLabel" class="badge bg-secondary">未選択</span>
          </div>
        </div>

        <!-- RBI -->
        <div class="mb-3">
          <label class="form-label fw-semibold">打点</label>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="changeRbi(-1)">－</button>
            <span id="rbiVal" class="fw-bold fs-5 px-3">0</span>
            <button class="btn btn-outline-secondary btn-sm" onclick="changeRbi(1)">＋</button>
          </div>
        </div>

        <!-- Note -->
        <div class="mb-1">
          <label class="form-label fw-semibold">メモ</label>
          <input id="abNote" type="text" class="form-control form-control-sm" placeholder="任意">
        </div>

        <input type="hidden" id="abId">
        <input type="hidden" id="abTeam">
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-danger btn-sm me-auto" id="abDeleteBtn" style="display:none" onclick="deleteCurrentAtBat()">
          <i class="bi bi-trash3 me-1"></i>削除
        </button>
        <button class="btn btn-primary btn-sm" onclick="saveAtBat()">
          <i class="bi bi-save me-1"></i>保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Substitution Modal ===== -->
<div class="modal fade" id="subModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:var(--primary);color:#fff">
        <h6 class="modal-title mb-0">選手交代を登録</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">退く選手</label>
          <select id="subReplaceOrder" class="form-select">
            <option value="">選択してください</option>
          </select>
          <input id="subReplaceText" type="text" class="form-control" placeholder="選手名または打順（例: 3）" style="display:none">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">区分</label>
          <select id="subType" class="form-select">
            <option value="代打">代打</option>
            <option value="代走">代走</option>
            <option value="守備交代">守備交代</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">交代選手</label>
          <select id="subPlayerSel" class="form-select">
            <option value="">選択してください</option>
          </select>
          <input id="subPlayerText" type="text" class="form-control mt-1" placeholder="選手名を入力" style="display:none">
        </div>
        <div class="mb-1">
          <label class="form-label fw-semibold">登場イニング（回）</label>
          <input id="subInning" type="number" class="form-control" min="1" max="15" placeholder="例: 5">
        </div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary btn-sm" onclick="saveSub()">
          <i class="bi bi-save me-1"></i>登録
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== Position Swap Modal ===== -->
<div class="modal fade" id="posSwapModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:var(--primary);color:#fff">
        <h6 class="modal-title mb-0">守備位置入替</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">イニング（回）</label>
          <input id="posSwapInning" type="number" class="form-control" min="1" max="15" placeholder="例: 3">
        </div>
        <div class="mb-2 fw-semibold small">入替選手（循環順に選択）</div>
        <div id="posSwapList"></div>
        <button type="button" class="btn btn-outline-secondary btn-sm mt-1 mb-3" onclick="addPosSwapRow()">＋ 選手を追加</button>
        <div id="posSwapPreview" class="alert alert-info py-1 px-2 small mb-0" style="display:none"></div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary btn-sm" onclick="savePosSwap()">
          <i class="bi bi-save me-1"></i>登録
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<script src="js/crypto.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/game.js"></script>
</body>
</html>
