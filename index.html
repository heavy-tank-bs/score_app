<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>草野球アプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3 py-2">
  <span class="navbar-brand"><i class="bi bi-trophy-fill me-2"></i>草野球スコアアプリ</span>
  <div class="d-flex gap-2">
    <a href="index.html"     class="nav-link text-white active small">ホーム</a>
    <a href="dashboard.html" class="nav-link text-white small">ダッシュボード</a>
  </div>
</nav>

<div class="container py-3">

  <!-- Team Name -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center justify-content-between">
      <span><i class="bi bi-shield-fill me-1"></i>チーム設定</span>
    </div>
    <div class="card-body">
      <div class="d-flex gap-2">
        <input id="teamNameInput" type="text" class="form-control" placeholder="チーム名">
        <button class="btn btn-primary btn-sm px-3" onclick="saveTeamName()">保存</button>
      </div>
    </div>
  </div>

  <!-- Players -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center justify-content-between">
      <span><i class="bi bi-people-fill me-1"></i>選手管理</span>
      <button class="btn btn-sm btn-light" onclick="toggleAddPlayer()">
        <i class="bi bi-plus-lg"></i> 追加
      </button>
    </div>
    <div class="card-body">
      <!-- Add Player Form -->
      <div id="addPlayerForm" class="border rounded p-3 mb-3 bg-light" style="display:none">
        <div class="row g-2 mb-2">
          <div class="col-4">
            <input id="pNumber" type="number" class="form-control form-control-sm" placeholder="背番号" min="0">
          </div>
          <div class="col-8">
            <input id="pName" type="text" class="form-control form-control-sm" placeholder="選手名（必須）">
          </div>
        </div>
        <div class="row g-2">
          <div class="col-6">
            <select id="pBats" class="form-select form-select-sm">
              <option value="">打席</option>
              <option value="右">右打</option>
              <option value="左">左打</option>
              <option value="両">両打</option>
            </select>
          </div>
          <div class="col-6">
            <select id="pThrows" class="form-select form-select-sm">
              <option value="">投球</option>
              <option value="右">右投</option>
              <option value="左">左投</option>
            </select>
          </div>
        </div>
        <div class="mt-2 d-flex gap-2">
          <button class="btn btn-primary btn-sm" onclick="addPlayer()">追加</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleAddPlayer()">キャンセル</button>
        </div>
      </div>

      <!-- Player List -->
      <div id="playerList">
        <div class="empty-msg">選手が登録されていません</div>
      </div>
    </div>
  </div>

  <!-- Games -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center justify-content-between">
      <span><i class="bi bi-calendar3 me-1"></i>試合一覧</span>
      <button class="btn btn-sm btn-light" onclick="newGame()">
        <i class="bi bi-plus-lg"></i> 新規試合
      </button>
    </div>
    <div class="card-body p-0">
      <div id="gameList">
        <div class="empty-msg py-4">試合が記録されていません</div>
      </div>
    </div>
  </div>

  <!-- Data Operations -->
  <div class="card">
    <div class="card-header"><i class="bi bi-database me-1"></i>データ管理</div>
    <div class="card-body">
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-outline-primary btn-sm" onclick="Storage.exportJSON()">
          <i class="bi bi-download me-1"></i>JSON書き出し
        </button>
        <label class="btn btn-outline-secondary btn-sm mb-0">
          <i class="bi bi-upload me-1"></i>JSON読み込み
          <input type="file" accept=".json" style="display:none" onchange="importJSON(this)">
        </label>
        <button class="btn btn-outline-success btn-sm" onclick="exportCSV('batting')">
          <i class="bi bi-file-earmark-spreadsheet me-1"></i>打撃CSV
        </button>
        <button class="btn btn-outline-success btn-sm" onclick="exportCSV('pitching')">
          <i class="bi bi-file-earmark-spreadsheet me-1"></i>投手CSV
        </button>
        <button class="btn btn-warning btn-sm" onclick="loadSampleData()">
          <i class="bi bi-stars me-1"></i>サンプルデータ
        </button>
      </div>
      <p class="text-muted small mt-2 mb-0">
        <i class="bi bi-info-circle me-1"></i>JSONは暗号化されて保存されます。
      </p>

      <!-- GitHub同期 -->
      <div class="mt-3 pt-3 border-top">
        <div class="d-flex align-items-center gap-2 mb-2">
          <i class="bi bi-github"></i>
          <span class="fw-semibold small">GitHub同期（チーム共有）</span>
          <button class="btn btn-xs btn-outline-secondary ms-auto"
            onclick="document.getElementById('ghSettingsArea').style.display=
              document.getElementById('ghSettingsArea').style.display==='none'?'':'none'">
            <i class="bi bi-gear me-1"></i>設定
          </button>
        </div>
        <div id="ghSettingsArea" style="display:none" class="mb-2">
          <div class="row g-2 mb-1">
            <div class="col-5">
              <input type="text" id="ghOwner" class="form-control form-control-sm"
                placeholder="GitHubユーザー名" value="kameao_club">
            </div>
            <div class="col-7">
              <input type="text" id="ghRepo" class="form-control form-control-sm"
                placeholder="リポジトリ名（例: team-score）">
            </div>
            <div class="col-8">
              <input type="text" id="ghPath" class="form-control form-control-sm"
                placeholder="ファイルパス（例: data/score.json）">
            </div>
            <div class="col-4">
              <button class="btn btn-sm btn-outline-secondary w-100"
                onclick="saveGithubSettings()">保存</button>
            </div>
            <div class="col-12">
              <input type="password" id="ghToken" class="form-control form-control-sm"
                placeholder="Personal Access Token（repo スコープ）">
            </div>
          </div>
          <p class="text-muted mb-0" style="font-size:0.75rem">
            <i class="bi bi-shield-lock me-1"></i>
            トークンはこのブラウザにのみ保存されます。fine-grained PAT (Contents: Read & Write) 推奨。
          </p>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-dark" onclick="githubPush()">
            <i class="bi bi-cloud-upload me-1"></i>GitHubへ保存
          </button>
          <button class="btn btn-sm btn-outline-dark" onclick="githubPull()">
            <i class="bi bi-cloud-download me-1"></i>GitHubから取得
          </button>
        </div>
        <div id="ghStatus" class="text-muted small mt-1" style="min-height:1.2em"></div>
      </div>
    </div>
  </div>
</div>

<!-- New Game Modal -->
<div class="modal fade" id="gameModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--primary);color:#fff">
        <h6 class="modal-title mb-0"><i class="bi bi-plus-circle me-2"></i>新規試合</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">日付 <span class="text-danger">*</span></label>
          <input id="gDate" type="date" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">相手チーム名 <span class="text-danger">*</span></label>
          <input id="gOpponent" type="text" class="form-control" placeholder="相手チーム">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">球場</label>
          <input id="gVenue" type="text" class="form-control" placeholder="球場名（任意）">
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">ホーム/アウェイ</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="homeAway" id="rHome" value="home" checked>
              <label class="form-check-label" for="rHome">ホーム（後攻）</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="homeAway" id="rAway" value="away">
              <label class="form-check-label" for="rAway">アウェイ（先攻）</label>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
        <button class="btn btn-primary btn-sm" onclick="createGame()">作成してスタメン登録へ</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
<script src="js/crypto.js"></script>
<script src="js/storage.js"></script>
<script src="js/github.js"></script>
<script src="js/stats.js"></script>
<script>
// ===== 初期化 =====
document.addEventListener('DOMContentLoaded', () => {
  Crypto.requireAuth(() => {
    document.getElementById('teamNameInput').value = Storage.getTeamName();
    renderPlayers();
    renderGames();
    document.getElementById('gDate').value = new Date().toISOString().slice(0, 10);
    renderGithubSettings();
  });
});

function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.className = `toast align-items-center text-white border-0 bg-${type}`;
  document.getElementById('toastMsg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, { delay: 2500 }).show();
}

// ===== チーム名 =====
function saveTeamName() {
  const name = document.getElementById('teamNameInput').value.trim();
  if (!name) return;
  Storage.setTeamName(name);
  showToast('チーム名を保存しました');
}

// ===== 選手管理 =====
function toggleAddPlayer() {
  const form = document.getElementById('addPlayerForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
  if (form.style.display === 'block') {
    document.getElementById('pName').focus();
  }
}

function addPlayer() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { alert('選手名を入力してください'); return; }
  const player = {
    name,
    number: document.getElementById('pNumber').value || '',
    bats:   document.getElementById('pBats').value,
    throws: document.getElementById('pThrows').value
  };
  Storage.addPlayer(player);
  document.getElementById('pName').value   = '';
  document.getElementById('pNumber').value = '';
  renderPlayers();
  showToast(`${name} を追加しました`);
}

function deletePlayer(id, name) {
  if (!confirm(`${name} を削除しますか？`)) return;
  Storage.deletePlayer(id);
  renderPlayers();
}

function renderPlayers() {
  const players = Storage.getPlayers();
  const el = document.getElementById('playerList');
  if (!players.length) {
    el.innerHTML = '<div class="empty-msg">選手が登録されていません</div>';
    return;
  }
  el.innerHTML = players.map(p => `
    <div class="d-flex align-items-center px-3 py-2 border-bottom">
      <span class="fw-bold me-2 text-muted" style="min-width:28px;font-size:.85rem">#${p.number || '-'}</span>
      <span class="flex-grow-1">${p.name}</span>
      ${p.bats   ? `<span class="badge bg-secondary me-1" style="font-size:.7rem">${p.bats}打</span>` : ''}
      ${p.throws ? `<span class="badge bg-secondary me-1" style="font-size:.7rem">${p.throws}投</span>` : ''}
      <button class="btn btn-sm btn-outline-danger ms-2" onclick="deletePlayer('${p.id}','${p.name}')">
        <i class="bi bi-trash3"></i>
      </button>
    </div>
  `).join('');
}

// ===== 試合管理 =====
function newGame() {
  document.getElementById('gDate').value     = new Date().toISOString().slice(0, 10);
  document.getElementById('gOpponent').value = '';
  document.getElementById('gVenue').value    = '';
  document.getElementById('rHome').checked   = true;
  new bootstrap.Modal(document.getElementById('gameModal')).show();
}

function createGame() {
  const date     = document.getElementById('gDate').value;
  const opponent = document.getElementById('gOpponent').value.trim();
  if (!date || !opponent) { alert('日付と相手チーム名は必須です'); return; }
  const isHome   = document.querySelector('input[name="homeAway"]:checked').value === 'home';
  const game     = Storage.createGame({ date, opponent, venue: document.getElementById('gVenue').value.trim(), isHome });
  bootstrap.Modal.getInstance(document.getElementById('gameModal')).hide();
  window.location.href = `game.html?id=${game.id}`;
}

function deleteGame(id, name) {
  if (!confirm(`「${name}」の試合データを削除しますか？`)) return;
  Storage.deleteGame(id);
  renderGames();
}

function renderGames() {
  const games = Storage.getGames().slice().reverse();
  const el = document.getElementById('gameList');
  if (!games.length) {
    el.innerHTML = '<div class="empty-msg py-4">試合が記録されていません</div>';
    return;
  }
  const myTeam = Storage.getTeamName();
  el.innerHTML = games.map(g => {
    const sc = Stats.gameScore(g);
    const score = g.status === 'completed'
      ? `<span class="fw-bold">${sc.my} - ${sc.opp}</span>`
      : `<span class="badge bg-secondary">記録中</span>`;
    const statusBadge = g.status === 'completed'
      ? (sc.my > sc.opp ? '<span class="badge bg-success ms-1">勝</span>'
          : sc.my < sc.opp ? '<span class="badge bg-danger ms-1">負</span>'
          : '<span class="badge bg-secondary ms-1">引</span>')
      : '';
    return `
      <div class="d-flex align-items-center px-3 py-2 border-bottom">
        <div class="flex-grow-1">
          <div class="fw-semibold">${g.date} vs ${g.opponent} ${statusBadge}</div>
          <div class="text-muted small">${g.venue ? g.venue + ' / ' : ''}${g.isHome ? 'ホーム' : 'アウェイ'} ${score}</div>
        </div>
        <div class="d-flex gap-1">
          <a href="game.html?id=${g.id}" class="btn btn-sm btn-primary">
            <i class="bi bi-pencil-fill"></i>
          </a>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteGame('${g.id}','${g.date} vs ${g.opponent}')">
            <i class="bi bi-trash3"></i>
          </button>
        </div>
      </div>`;
  }).join('');
}

// ===== GitHub同期 =====
function renderGithubSettings() {
  const cfg = GitHub.getConfig();
  if (cfg.owner) document.getElementById('ghOwner').value = cfg.owner;
  if (cfg.repo)  document.getElementById('ghRepo').value  = cfg.repo;
  if (cfg.path)  document.getElementById('ghPath').value  = cfg.path;
  if (cfg.token) document.getElementById('ghToken').value = cfg.token;
}

function saveGithubSettings() {
  const cfg = {
    owner: document.getElementById('ghOwner').value.trim(),
    repo:  document.getElementById('ghRepo').value.trim(),
    path:  document.getElementById('ghPath').value.trim(),
    token: document.getElementById('ghToken').value.trim(),
  };
  GitHub.saveConfig(cfg);
}

async function githubPush() {
  saveGithubSettings();
  const status = document.getElementById('ghStatus');
  status.textContent = '保存中...';
  try {
    await GitHub.push();
    status.textContent = '✓ GitHubへ保存しました（' + new Date().toLocaleTimeString() + '）';
    showToast('GitHubへ保存しました');
  } catch (e) {
    status.textContent = '✗ ' + e.message;
    showToast(e.message, 'danger');
  }
}

async function githubPull() {
  if (!confirm('GitHubからデータを取得します。\nローカルの未保存データは上書きされます。')) return;
  saveGithubSettings();
  const status = document.getElementById('ghStatus');
  status.textContent = '取得中...';
  try {
    await GitHub.pull();
    status.textContent = '✓ GitHubから取得しました（' + new Date().toLocaleTimeString() + '）';
    showToast('GitHubからデータを取得しました');
    document.getElementById('teamNameInput').value = Storage.getTeamName();
    renderPlayers();
    renderGames();
  } catch (e) {
    status.textContent = '✗ ' + e.message;
    showToast(e.message, 'danger');
  }
}

// ===== Import/Export =====
async function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    await Storage.importJSON(file);
    showToast('データを読み込みました');
    document.getElementById('teamNameInput').value = Storage.getTeamName();
    renderPlayers();
    renderGames();
  } catch(e) {
    showToast('読み込みに失敗しました', 'danger');
  }
  input.value = '';
}

function exportCSV(type) {
  const data = Storage.get();
  let content, filename;
  if (type === 'batting') {
    const stats = Stats.getAllBatting(data);
    const header = ['選手名','背番号','試合','打席','打数','安打','二塁打','三塁打','本塁打','打点','四球','死球','三振','打率','出塁率','長打率','OPS','IsoP','IsoD'];
    const rows = stats.map(s => [
      s.name, s.number||'', s.games, s.pa, s.ab, s.h, s.s2b, s.s3b, s.hr,
      s.rbi, s.bb, s.hbp, s.k,
      Stats.fmt(s.avg), Stats.fmt(s.obp), Stats.fmt(s.slg), Stats.fmt(s.ops),
      Stats.fmt(s.isoP), Stats.fmt(s.isoD)
    ]);
    content  = [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    filename = `batting_${new Date().toISOString().slice(0,10)}.csv`;
  } else {
    const stats = Stats.getAllPitching(data);
    const header = ['選手名','背番号','登板','勝','負','S','投球回','被安打','奪三振','四球','死球','失点','自責点','ERA'];
    const rows = stats.map(s => [
      s.name, s.number||'', s.games, s.wins, s.losses, s.saves,
      s.ip, s.hits, s.k, s.bb, s.hbp, s.r, s.er,
      s.era != null ? s.era.toFixed(2) : '-'
    ]);
    content  = [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    filename = `pitching_${new Date().toISOString().slice(0,10)}.csv`;
  }
  Storage.downloadCSV(content, filename);
}
